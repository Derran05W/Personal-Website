name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  ci:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.2

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Unit tests
        run: pnpm test

      - name: Build
        run: pnpm build

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      # Playwright's CLI exits non-zero on "no tests found", so only run `pnpm smoke`
      # when at least one *.spec.ts file exists under e2e/ — guards against a repo
      # state with the config present but no specs yet.
      - name: Playwright smoke
        run: |
          if find e2e -type f \( -name '*.spec.ts' -o -name '*.spec.tsx' \) 2>/dev/null | grep -q .; then
            pnpm smoke
          else
            echo "No Playwright spec files under e2e/ yet — skipping (added by a later task)."
          fi

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
          if-no-files-found: ignore
